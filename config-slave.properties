# CacheSQL Slave config
server.mode=all
server.port=8081
server.threads=4
server.role=slave
server.master.url=http://127.0.0.1:8080
server.sync.port=19091
server.oplog.capacity=1000
server.pending.capacity=100
server.pending.flush.interval=2000

# DB (not used in this test, sql==name skips JDBC)
db.driver=oracle.jdbc.driver.OracleDriver
db.url=jdbc:oracle:thin:@127.0.0.1:1521:orcl
db.username=dummy
db.password=dummy

# Test table (sql==name → skip JDBC, empty table)
cache.table.test_rep.sql=test_rep
cache.table.test_rep.indexes=id,name
cache.table.test_rep.columns=id,name,age
