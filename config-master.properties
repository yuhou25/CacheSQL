db.url=jdbc:oracle:thin:@127.0.0.1:1521:orcl
db.username=dummy
db.password=dummy

# Test table (sql==name → skip JDBC, empty table)
cache.table.test_rep.sql=test_rep
cache.table.test_rep.indexes=id,name
cache.table.test_rep.columns=id,name,age
